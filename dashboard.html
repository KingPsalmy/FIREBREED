<!DOCTYPE html>
<html lang="en">
<head>
    <title>FIREBREED — Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <img src="images/logo.png" alt="Firebreed Logo" class="logo">
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="mymusic.html">My Music</a>
                <a href="upload.html">Upload</a>
                <a href="analytics.html">Analytics</a>
                <a href="royalties.html">Royalties</a>
                <a href="profile.html">Profile</a>
            </nav>
            <a href="index.html" class="logout">Log Out</a>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <div class="dashboard-header">
                <h1>Welcome back, Artist 🔥</h1>
                <p>Here's how your music is performing</p>
            </div>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Total Streams</p>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Total Earnings</p>
                    <p class="stat-number">$0.00</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Releases</p>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Platforms</p>
                    <p class="stat-number">0</p>
                </div>
            </div>

            <!-- RECENT RELEASES -->
            <div class="section">
                <h2>Recent Releases</h2>
                <div class="releases">
                    <p style="color:#888">No releases yet. <a href="upload.html" style="color:#ff4500">Upload your first track!</a></p>
                </div>
            </div>

        </main>
    </div>

    <script src="js/config.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
